[workspace]
resolver = "3"
members = [
    "crates/core",
    "crates/index",
    "crates/service",
    "crates/cli",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
rust-version = "1.96"
repository = "https://github.com/jordiboehme/crystalline"

[workspace.dependencies]
crystalline-core = { path = "crates/core" }
crystalline-index = { path = "crates/index" }
crystalline-service = { path = "crates/service" }

clap = { version = "4.6.1", features = ["derive"] }
tokio = { version = "1.52.3", features = ["full"] }
rmcp = "2.1.0"
turso = "0.6.1"
candle-core = "0.11.0"
candle-transformers = "0.11.0"
hf-hub = "0.5.0"
tokenizers = "0.23.1"
pulldown-cmark = "0.13.4"
notify = "8.2.0"
interprocess = "2.4.2"
sha2 = "0.11.0"
chrono = "0.4.45"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
indexmap = "2.14.0"
reqwest = { version = "0.13.4", default-features = false, features = ["rustls-tls", "json"] }
fs4 = "1.1.0"
serde_yaml_ng = "0.10.0"
serde-saphyr = "0.0.28"
saphyr = "0.0.6"
yaml-rust2 = "0.11.0"
async-trait = "0.1.89"
thiserror = "2.0.18"
anyhow = "1.0.103"
etcetera = "0.11.0"
walkdir = "2.5.0"
globset = "0.4.18"
schemars = "1.2.1"
futures = "0.3.32"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"

insta = { version = "1.48.0", features = ["yaml"] }
assert_cmd = "2.2.2"
tempfile = "3.27.0"
