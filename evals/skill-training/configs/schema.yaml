# Crystalline schema skill, training config. Self-contained like
# routing.yaml. Schema rollouts author, validate and fix schemas, so
# tasks get more turns and a longer timeout than routing; scoring diffs
# the verify layer and reads the written schema engrams from the sandbox
# post-state (see envs/crystalline_schema/scoring.py).

model:
  backend: claude
  optimizer: claude-sonnet-5
  target: claude-haiku-4-5-20251001
  optimizer_backend: claude_chat
  target_backend: claude_chat
  reasoning_effort: ""

train:
  num_epochs: 3
  train_size: 0
  batch_size: 8
  accumulation: 1
  seed: 42

gradient:
  minibatch_size: 4
  merge_batch_size: 8
  analyst_workers: 4
  max_analyst_rounds: 3
  failure_only: false

optimizer:
  learning_rate: 4
  min_learning_rate: 2
  lr_scheduler: cosine
  lr_control_mode: fixed
  skill_update_mode: patch
  use_slow_update: true
  slow_update_samples: 8
  slow_update_gate_with_selection: false
  longitudinal_pair_policy: mixed
  use_meta_skill: true

evaluation:
  use_gate: true
  gate_metric: hard
  sel_env_num: 0
  test_env_num: 0
  eval_test: true

env:
  name: crystalline_schema
  skill_init: outputs/seed_schema.md
  split_mode: split_dir
  split_dir: data/schema_split
  fixture_root: fixtures/workspaces
  crystalline_bin: ../../target/release/crystalline
  claude_bin: claude
  claude_model: claude-haiku-4-5-20251001
  workers: 4
  max_turns: 16
  exec_timeout: 300
  limit: 0
