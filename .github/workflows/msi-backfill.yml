# One-off: backfill the Windows MSI onto an already-published release whose
# tag predates the MSI packaging steps. Wraps the exact binary from the
# release's own zip (never a rebuild), so the MSI matches what the release
# already ships. Delete this workflow after use.
name: MSI backfill

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to backfill (for example v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  backfill:
    name: backfill ${{ github.event.inputs.tag }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download the released zip and checksums
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag }}"
          mkdir -p downloads
          gh release download "$tag" --repo "${{ github.repository }}" \
            --pattern "crystalline-${tag}-windows-amd64.zip" \
            --pattern SHA256SUMS --dir downloads
          if grep -q "crystalline-${tag}-windows-amd64.msi" downloads/SHA256SUMS; then
            echo "::error::the release already carries an MSI"
            exit 1
          fi
          # The MSI must wrap exactly what the release shipped: verify the
          # zip against the release's own checksums before touching it.
          expected=$(grep "crystalline-${tag}-windows-amd64.zip" downloads/SHA256SUMS | awk '{print $1}')
          actual=$(sha256sum "downloads/crystalline-${tag}-windows-amd64.zip" | awk '{print $1}')
          if [ "$expected" != "$actual" ]; then
            echo "::error::zip checksum mismatch"
            exit 1
          fi

      - name: Stage the released binary where cargo-wix looks
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag }}"
          unzip -j "downloads/crystalline-${tag}-windows-amd64.zip" crystalline.exe -d downloads
          mkdir -p target/x86_64-pc-windows-msvc/release
          cp downloads/crystalline.exe target/x86_64-pc-windows-msvc/release/crystalline.exe

      - name: Install cargo-wix
        run: cargo install cargo-wix --version 0.3.9 --locked

      - name: Build the .msi from the released binary
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag }}"
          msi_version="${tag#v}"
          msi_version="${msi_version%%-*}"
          cargo wix -p crystalline \
            --no-build --nocapture \
            --target x86_64-pc-windows-msvc \
            --install-version "$msi_version" \
            --output "dist/crystalline-${tag}-windows-amd64.msi"

      - name: Smoke test the .msi
        shell: pwsh
        run: |
          $msi = (Get-Item dist/*.msi).FullName
          $log = Join-Path $env:RUNNER_TEMP 'msi-install.log'
          $p = Start-Process msiexec -ArgumentList "/i `"$msi`" /qn /norestart /L*v `"$log`"" -Wait -PassThru
          if ($p.ExitCode -ne 0) { Get-Content $log -Tail 50; throw "install failed: $($p.ExitCode)" }
          $exe = 'C:\Program Files\Crystalline\bin\crystalline.exe'
          if (-not (Test-Path $exe)) { throw 'crystalline.exe missing after install' }
          & $exe --version
          $sysPath = (Get-ItemProperty 'HKLM:\SYSTEM\CurrentControlSet\Control\Session Manager\Environment').Path
          if ($sysPath -notlike '*Crystalline\bin*') { throw 'install dir not on the system PATH' }
          $p = Start-Process msiexec -ArgumentList "/x `"$msi`" /qn /norestart" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "uninstall failed: $($p.ExitCode)" }

      - name: Upload the .msi and refresh SHA256SUMS
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag }}"
          msi="dist/crystalline-${tag}-windows-amd64.msi"
          sha=$(sha256sum "$msi" | awk '{print $1}')
          # Keep the file in the same order `sha256sum *` produced it:
          # alphabetical by filename.
          printf '%s  %s\n' "$sha" "$(basename "$msi")" >> downloads/SHA256SUMS
          sort -k2 -o downloads/SHA256SUMS downloads/SHA256SUMS
          gh release upload "$tag" --repo "${{ github.repository }}" \
            "$msi" downloads/SHA256SUMS --clobber
