name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        include:
          # candle-core pulls in gemm-f16, whose aarch64 NEON kernels emit
          # fullfp16 asm without gating it behind a target-feature check
          # (upstream bug, see research notes). aarch64-apple-darwin enables
          # +fp16 by default so only this Linux arm64 leg needs the flag.
          - os: ubuntu-24.04-arm
            rustflags: '-C target-feature=+fp16'
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        run: rustup show

      - uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo nextest run
        run: cargo nextest run --workspace

      - name: cargo test --doc
        run: cargo test --workspace --doc

  postgres-parity:
    name: postgres-parity
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg17-bookworm
        env:
          POSTGRES_PASSWORD: crystalline
          POSTGRES_DB: crystalline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CRYSTALLINE_TEST_POSTGRES_URL: postgres://postgres:crystalline@localhost:5432/crystalline_test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Create the pgvector extension
        # Pre-create it in public so the migration's defensive CREATE EXTENSION
        # is always a no-op and the parallel per-test schema creation is race
        # free. psql ships on the ubuntu-latest runner image.
        run: PGPASSWORD=crystalline psql -h localhost -U postgres -d crystalline_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: cargo test (parity suite on both backends)
        run: cargo test -p crystalline-index

  style:
    name: style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run style lint
        run: bash scripts/style-lint.sh

  musl-spike:
    name: musl-spike
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        run: rustup show

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build crystalline for musl
        run: cargo build --release --target x86_64-unknown-linux-musl -p crystalline

  # Dogfoods the bundled action end to end: it downloads the latest release
  # binary from jordiboehme/crystalline and verifies a fixture domain. A
  # regression to the caller's repo (the github.action_repository quirk that
  # this job guards against) would fail at the download step.
  verify-action:
    name: verify-action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./action
        with:
          paths: tests/fixtures/domain-good
          comment: 'false'
