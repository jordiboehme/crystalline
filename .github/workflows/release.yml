name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual dry run: exercises the full build-and-package matrix without
  # publishing a GitHub Release (the publish, images and homebrew jobs only
  # run for a tag push).
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            platform: macos-arm64
            os: macos-latest
            archive_ext: tar.gz
          - target: x86_64-unknown-linux-musl
            platform: linux-amd64
            os: ubuntu-latest
            archive_ext: tar.gz
            musl: true
            deb_arch: amd64
          - target: aarch64-unknown-linux-musl
            platform: linux-arm64
            os: ubuntu-24.04-arm
            archive_ext: tar.gz
            musl: true
            deb_arch: arm64
            # candle-core pulls in gemm-f16, whose aarch64 NEON kernels emit
            # fullfp16 asm without gating it behind a target-feature check
            # (upstream bug, see research notes). aarch64-apple-darwin
            # enables +fp16 by default so only this Linux arm64 leg needs it.
            rustflags: '-C target-feature=+fp16'
          - target: x86_64-pc-windows-msvc
            platform: windows-amd64
            os: windows-latest
            archive_ext: zip
            rustflags: '-C target-feature=+crt-static'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        run: rustup show

      - name: Add release target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build crystalline
        run: cargo build --release --target ${{ matrix.target }} -p crystalline
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Locate the built binary
        id: bin
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/crystalline"
          if [ "${{ runner.os }}" = "Windows" ]; then
            bin="target/${{ matrix.target }}/release/crystalline.exe"
          fi
          if [ ! -f "$bin" ]; then
            echo "::error::built binary not found at $bin"
            exit 1
          fi
          echo "path=$bin" >> "$GITHUB_OUTPUT"

      - name: Smoke test the binary
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.bin.outputs.path }}" --version
          "${{ steps.bin.outputs.path }}" verify --help

      - name: Stage archive contents
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          name="crystalline-${version}-${{ matrix.platform }}"
          stage="dist/$name"
          mkdir -p "$stage"
          cp "${{ steps.bin.outputs.path }}" "$stage/"
          cp LICENSE "$stage/"
          cp README.md "$stage/"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Package archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        working-directory: dist
        run: tar czf "${{ steps.stage.outputs.name }}.tar.gz" "${{ steps.stage.outputs.name }}"

      - name: Package archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        working-directory: dist
        run: Compress-Archive -Path "${{ steps.stage.outputs.name }}/*" -DestinationPath "${{ steps.stage.outputs.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crystalline-${{ matrix.platform }}
          path: dist/${{ steps.stage.outputs.name }}.${{ matrix.archive_ext }}
          if-no-files-found: error

      # .deb packages: only the two musl legs produce one, since a static
      # musl binary needs no runtime shared-library dependencies (Depends is
      # left empty in crates/cli/Cargo.toml's [package.metadata.deb] rather
      # than the "$auto" default that would try to resolve them via ldd).
      - name: Install cargo-deb
        if: matrix.musl
        run: cargo install cargo-deb --version 3.7.0 --locked

      - name: Build .deb package
        if: matrix.musl
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          deb_version="${version#v}"
          cargo deb -p crystalline \
            --target ${{ matrix.target }} \
            --no-build \
            --deb-version "$deb_version" \
            --output "dist/crystalline_${deb_version}_${{ matrix.deb_arch }}.deb"

      - name: Upload .deb artifact
        if: matrix.musl
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crystalline-deb-${{ matrix.deb_arch }}
          path: dist/crystalline_*.deb
          if-no-files-found: error

  mcpb:
    name: package MCP bundles
    needs: build
    runs-on: ubuntu-latest
    # No tag guard, unlike publish/images/homebrew below: a workflow_dispatch
    # dry run packages and validates all four bundles too, it just has
    # nowhere to upload them.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          else
            version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Download macos-arm64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: crystalline-macos-arm64
          path: downloads/macos-arm64

      - name: Download linux-amd64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: crystalline-linux-amd64
          path: downloads/linux-amd64

      - name: Download linux-arm64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: crystalline-linux-arm64
          path: downloads/linux-arm64

      - name: Download windows-amd64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: crystalline-windows-amd64
          path: downloads/windows-amd64

      # One shell loop over the four platforms rather than a build-style
      # matrix, so the four resulting .mcpb files land in a single directory
      # and can be uploaded as one combined artifact below.
      - name: Stage bundles, generate manifests and pack
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p mcpb-out
          for platform in macos-arm64 linux-amd64 linux-arm64 windows-amd64; do
            download_dir="downloads/$platform"
            stage="bundle/$platform"
            mkdir -p "$stage/server"

            if [ "$platform" = "windows-amd64" ]; then
              unzip -q "$download_dir"/*.zip -d "$download_dir"
              bin=$(find "$download_dir" -type f -name 'crystalline.exe' | head -n1)
              cp "$bin" "$stage/server/crystalline.exe"
            else
              tar xzf "$download_dir"/*.tar.gz -C "$download_dir"
              bin=$(find "$download_dir" -type f -name 'crystalline' | head -n1)
              cp "$bin" "$stage/server/crystalline"
              chmod +x "$stage/server/crystalline"
            fi

            packaging/mcpb/generate-manifest.sh "$platform" "$version" "$stage"
            npx --yes @anthropic-ai/mcpb validate "$stage"
            npx --yes @anthropic-ai/mcpb pack "$stage" "mcpb-out/crystalline-v${version}-${platform}.mcpb"
          done

      - name: Upload mcpb artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcpb-bundles
          path: mcpb-out/*.mcpb
          if-no-files-found: error

  publish:
    name: publish release
    needs: [build, mcpb]
    runs-on: ubuntu-latest
    # Only a tag push produces a real GitHub Release; workflow_dispatch stops
    # after the build matrix above so it can be used as a dry run.
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: downloads

      - name: Collect archives and generate checksums
        run: |
          set -euo pipefail
          mkdir -p release
          find downloads -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.deb' -o -name '*.mcpb' \) -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          ls -la

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ github.ref_name }}" release/* \
            --title "${{ github.ref_name }}" \
            --generate-notes

  images:
    name: publish container images
    needs: build
    runs-on: ubuntu-latest
    # Same tag guard as publish: workflow_dispatch is a build-matrix dry run
    # only, it never pushes an image.
    if: github.ref_type == 'tag'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download x86_64 musl artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: crystalline-linux-amd64
          path: downloads/amd64

      - name: Download aarch64 musl artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: crystalline-linux-arm64
          path: downloads/arm64

      - name: Stage per-arch binaries
        run: |
          set -euo pipefail
          mkdir -p dist/linux-amd64 dist/linux-arm64
          tar xzf downloads/amd64/*.tar.gz -C downloads/amd64
          tar xzf downloads/arm64/*.tar.gz -C downloads/arm64
          amd64_bin=$(find downloads/amd64 -type f -name crystalline | head -n1)
          arm64_bin=$(find downloads/arm64 -type f -name crystalline | head -n1)
          cp "$amd64_bin" dist/linux-amd64/crystalline
          cp "$arm64_bin" dist/linux-arm64/crystalline
          chmod +x dist/linux-amd64/crystalline dist/linux-arm64/crystalline

      # The model layer is arch-independent (weights, tokenizer and config
      # files, no compiled code), so it is fetched once here on the runner
      # rather than once per target platform in the buildx step below. The
      # staged amd64 binary is statically linked (musl) and runs fine on this
      # glibc runner. XDG_CACHE_HOME is redirected to a scratch directory so
      # this never touches the runner's real cache, and the resulting
      # `crystalline/models` directory is renamed to `dist/model` to match
      # the layout `runtime-with-model` in the Dockerfile expects.
      - name: Prefetch the embedding model
        run: |
          set -euo pipefail
          XDG_CACHE_HOME="$PWD/dist/model-xdg" ./dist/linux-amd64/crystalline model download
          mv dist/model-xdg/crystalline/models dist/model

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/jordiboehme/crystalline
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Crystalline
            org.opencontainers.image.description=Local-first knowledge management for humans and AI agents.
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate with-model image metadata
        id: meta_with_model
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/jordiboehme/crystalline
          tags: |
            type=semver,pattern={{version}},suffix=-with-model
            type=raw,value=with-model
          labels: |
            org.opencontainers.image.title=Crystalline (with model)
            org.opencontainers.image.description=Local-first knowledge management for humans and AI agents, with the BAAI/bge-small-en-v1.5 embedding model (MIT licensed) baked in so semantic search is ready immediately with no runtime download.
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      # Builds the variant for one platform and loads it into the local
      # docker daemon (buildx --load does not support a multi-platform
      # manifest) so it can be smoke tested below before anything is pushed.
      - name: Build the with-model image for an offline smoke test
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime-with-model
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ steps.meta_with_model.outputs.tags }}
          labels: ${{ steps.meta_with_model.outputs.labels }}

      # Proves the baked model is complete and usable with zero network
      # access before the variant is published: `--network none` means
      # `model download` can only succeed by finding every file already in
      # place (including the hf-hub blob symlinks surviving the Dockerfile
      # COPY intact), the same offline path a real air-gapped deployment
      # depends on.
      - name: Verify the with-model image works fully offline
        run: |
          set -euo pipefail
          image="$(head -n1 <<< "${{ steps.meta_with_model.outputs.tags }}")"
          output="$(docker run --rm --network none "$image" model download)"
          echo "$output"
          grep -q "Model ready" <<< "$output"

      - name: Build and push the with-model image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime-with-model
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_with_model.outputs.tags }}
          labels: ${{ steps.meta_with_model.outputs.labels }}

  homebrew:
    name: update homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: read
    steps:
      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/release
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern SHA256SUMS --dir /tmp/release

      - name: Regenerate and push the formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          sums="/tmp/release/SHA256SUMS"

          sha_macos_arm=$(grep "crystalline-${TAG}-macos-arm64.tar.gz" "$sums" | awk '{print $1}')
          sha_linux_amd64=$(grep "crystalline-${TAG}-linux-amd64.tar.gz" "$sums" | awk '{print $1}')
          sha_linux_arm64=$(grep "crystalline-${TAG}-linux-arm64.tar.gz" "$sums" | awk '{print $1}')

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/jordiboehme/homebrew-tap.git" \
            "${{ runner.temp }}/homebrew-tap"

          mkdir -p "${{ runner.temp }}/homebrew-tap/Formula"

          cat > "${{ runner.temp }}/homebrew-tap/Formula/crystalline.rb" << FORMULA
          class Crystalline < Formula
            desc "Local-first knowledge management for humans and AI agents"
            homepage "https://github.com/jordiboehme/crystalline"
            license "AGPL-3.0-or-later"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/jordiboehme/crystalline/releases/download/v#{version}/crystalline-v#{version}-macos-arm64.tar.gz"
                sha256 "${sha_macos_arm}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/jordiboehme/crystalline/releases/download/v#{version}/crystalline-v#{version}-linux-amd64.tar.gz"
                sha256 "${sha_linux_amd64}"
              end

              on_arm do
                url "https://github.com/jordiboehme/crystalline/releases/download/v#{version}/crystalline-v#{version}-linux-arm64.tar.gz"
                sha256 "${sha_linux_arm64}"
              end
            end

            def install
              bin.install "crystalline"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/crystalline --version")
            end
          end
          FORMULA

          cd "${{ runner.temp }}/homebrew-tap"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/crystalline.rb
          git commit -m "Update crystalline to ${VERSION}"
          git push
