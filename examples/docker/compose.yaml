# Crystalline, single container.
#
# Engrams are the only data that matters and they live in the bind-mounted
# `./knowledge` folder on the host, one subfolder per domain. Everything
# under the named `crystalline-data` volume (the search index, the embedding
# model cache, config) is derived or cached - the image's XDG_STATE_HOME,
# XDG_CACHE_HOME and XDG_CONFIG_HOME all point under /data (see Dockerfile),
# so a single volume covers all of it. Losing it costs a `crystalline
# reindex --full` and a model re-download, never data.
#
# Agents connect over the HTTP MCP endpoint at http://localhost:7411 from
# the host (or http://crystalline:7411 from another container on this
# compose network) - stdio `crystalline mcp` is for local, non-containerized
# processes.
#
# Start it:
#   docker compose -f examples/docker/compose.yaml up -d
#
# One-shot initialization (run once, before or after the service is up - it
# is a separate short-lived container each time, not a shell session).
# domain add indexes /knowledge/team immediately: routed to the running
# service over the shared /data volume when it is already up, or indexed
# directly otherwise:
#
#   docker compose -f examples/docker/compose.yaml run --rm crystalline domain init /knowledge/team --name team
#   docker compose -f examples/docker/compose.yaml run --rm crystalline domain add team /knowledge/team

services:
  crystalline:
    image: ghcr.io/jordiboehme/crystalline:latest
    # Alternative: the with-model variant, with the BAAI/bge-small-en-v1.5
    # embedding model baked in. Use it when the daemon needs semantic search
    # ready on its very first start, or when this host has no egress to
    # huggingface.co (air-gapped or otherwise offline deployments):
    # image: ghcr.io/jordiboehme/crystalline:with-model
    command: ["serve", "--http", "0.0.0.0:7411"]
    # Read-only variant: hide and refuse the four content-mutating tools so
    # agents can only search and read this deployment's knowledge. Sync,
    # watching and embedding still run, so the index keeps following external
    # edits to ./knowledge. Swap the command line above for:
    # command: ["serve", "--http", "0.0.0.0:7411", "--read-only"]
    ports:
      - "7411:7411"
    volumes:
      - ./knowledge:/knowledge
      - crystalline-data:/data
    restart: unless-stopped

volumes:
  crystalline-data:
